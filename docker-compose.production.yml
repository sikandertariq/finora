services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy noeviction
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  django:
    image: ${FINORA_BACKEND_IMAGE}
    restart: unless-stopped
    env_file: ${FINORA_ENV_FILE:-./.env.production}
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      GUNICORN_WORKERS: "1"
      GUNICORN_THREADS: "2"
    command: ./scripts/start-production.sh
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data/media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    image: ${FINORA_BACKEND_IMAGE}
    restart: unless-stopped
    env_file: ${FINORA_ENV_FILE:-./.env.production}
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    command: celery -A config worker --loglevel=info --concurrency=1
    volumes:
      - ./data/media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    image: ${FINORA_BACKEND_IMAGE}
    restart: unless-stopped
    env_file: ${FINORA_ENV_FILE:-./.env.production}
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    command: celery -A config beat --loglevel=info --schedule=/var/lib/finora/celerybeat-schedule
    volumes:
      - ./data/media:/app/media
      - ./data/celery-beat:/var/lib/finora
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
