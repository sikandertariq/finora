name: Deploy backend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/finora-backend
          tags: type=sha,prefix=
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image-meta.outputs.tags }}
          labels: ${{ steps.image-meta.outputs.labels }}
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Deploy via Systems Manager
        env:
          IMAGE_REF: ghcr.io/${{ github.repository_owner }}/finora-backend:${{ github.sha }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --instance-ids "${{ vars.AWS_INSTANCE_ID }}" \
            --parameters commands="cd /srv/finora || git clone https://github.com/${{ github.repository }}.git /srv/finora; cd /srv/finora; git fetch origin main; git switch main; git pull --ff-only origin main; ./deploy/production/deploy-remote.sh $IMAGE_REF ${{ vars.BACKEND_PUBLIC_IP }}" \
            --query 'Command.CommandId' --output text)
          set +e
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${{ vars.AWS_INSTANCE_ID }}"
          WAIT_STATUS=$?
          set -e
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ vars.AWS_INSTANCE_ID }}" \
            --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
            --output json
          exit "$WAIT_STATUS"
      - name: Verify public HTTPS health endpoint
        run: curl --fail --retry 6 --retry-delay 5 "https://${{ vars.BACKEND_PUBLIC_IP }}/api/health/"
