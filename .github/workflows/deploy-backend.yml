name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/deploy-backend.yml
      - backend/**
      - deploy/**
      - docker-compose.production.yml
      - infra/aws/**
  workflow_dispatch:

concurrency:
  group: finora-production-backend
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/finora-backend
          tags: type=sha,prefix=
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image-meta.outputs.tags }}
          labels: ${{ steps.image-meta.outputs.labels }}
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Deploy via Systems Manager
        env:
          IMAGE_REF: ghcr.io/${{ github.repository_owner }}/finora-backend:${{ steps.image-meta.outputs.version }}
        run: |
          REMOTE_COMMAND=$(printf '%s\n' \
            'set -eu' \
            'export HOME=/root' \
            "if [ ! -d /srv/finora/.git ]; then git clone https://github.com/${{ github.repository }}.git /srv/finora; fi" \
            'git config --global --add safe.directory /srv/finora' \
            'cd /srv/finora' \
            'git fetch origin main' \
            'git switch main' \
            'git pull --ff-only origin main' \
            "./deploy/production/deploy-remote.sh '$IMAGE_REF' '${{ vars.BACKEND_PUBLIC_IP }}'")
          PARAMETERS=$(jq -nc --arg command "$REMOTE_COMMAND" \
            '{commands: [$command], executionTimeout: ["600"]}')
          COMMAND_ID=$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --instance-ids "${{ vars.AWS_INSTANCE_ID }}" \
            --timeout-seconds 60 \
            --parameters "$PARAMETERS" \
            --query 'Command.CommandId' --output text)
          INSTANCE_ID="${{ vars.AWS_INSTANCE_ID }}"
          echo "SSM command ID: $COMMAND_ID"

          print_invocation() {
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '{Status:Status,StatusDetails:StatusDetails,ResponseCode:ResponseCode,ExecutionStartDateTime:ExecutionStartDateTime,ExecutionEndDateTime:ExecutionEndDateTime,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
              --output json
          }

          # SSM gets 60 seconds to deliver the command and 600 seconds to run
          # it. Poll beyond that combined deadline so terminal output is kept.
          LAST_STATUS=""
          for _ in $(seq 1 144); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || true)
            if [[ "$STATUS" != "$LAST_STATUS" ]]; then
              echo "SSM status: ${STATUS:-NotReady}"
              LAST_STATUS="$STATUS"
            fi
            case "$STATUS" in
              Success)
                print_invocation
                exit 0
                ;;
              Failed|Cancelled|TimedOut)
                print_invocation
                exit 1
                ;;
            esac
            sleep 5
          done

          aws ssm cancel-command \
            --command-id "$COMMAND_ID" \
            --instance-ids "$INSTANCE_ID" || true
          print_invocation || true
          echo "Timed out waiting for the Systems Manager deployment" >&2
          exit 1
      - name: Verify public HTTPS health endpoint
        run: curl --fail --retry 6 --retry-delay 5 "https://${{ vars.BACKEND_PUBLIC_IP }}/api/health/"
